<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RivalidadeGamer</title>

    <!-- CSS do RivalidadeGamer -->
    <link rel="stylesheet" href="https://rivalixgaming.github.io/pre-cadastro-rivalix/style.css">
</head>

<body>

    <div class="login-container">
        <h2>Entrar na RivalidadeGamer</h2>

        <form id="loginForm">
            <input type="text" id="username" placeholder="Utilizador" required>
            <input type="password" id="password" placeholder="Senha" required>

            <button type="submit">Login</button>
        </form>

        <p id="loginStatus" style="margin-top:10px; color:red;"></p>
    </div>

    <!-- Carrega os utilizadores -->
    <script src="../users/users-login/mega/utilizator/user.js"></script>

    <script>
        const form = document.getElementById("loginForm");
        const status = document.getElementById("loginStatus");

        form.addEventListener("submit", function(e) {
            e.preventDefault();

            const user = document.getElementById("username").value.trim();
            const pass = document.getElementById("password").value.trim();

            // Verifica se user.js carregou corretamente
            if (typeof users === "undefined") {
                status.textContent = "Erro: user.js não foi encontrado.";
                return;
            }

            // Procura utilizador
            const found = users.find(u => u.username === user && u.password === pass);

            if (found) {
                status.style.color = "green";
                status.textContent = "Login bem-sucedido!";

                // Redireciona para página protegida
                setTimeout(() => {
                    window.location.href = "../dashboard/index.html";
                }, 800);

            } else {
                status.style.color = "red";
                status.textContent = "Utilizador ou senha incorretos.";
            }
        });
    </script>

</body>
</html>
